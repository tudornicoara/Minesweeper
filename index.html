<!DOCTYPE html>
<html lang="en">
<head>
    <title>Minesweeper</title>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', saved || preferred);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/p5.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="app">
    <main id="canvas-container"></main>

    <aside id="panel">
        <h1>💣 Minesweeper</h1>
        <button type="button" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="toggle-moon">🌙</span>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-sun">☀️</span>
        </button>

        <section class="section">
            <h2>Actions</h2>
            <div class="button-group">
                <button type="button" onclick="resetGame()" class="btn btn-primary">↺ Reset</button>
                <button type="button" onclick="hint()" class="btn btn-secondary">💡 Hint</button>
                <button type="button" onclick="revealAllBombs()" class="btn btn-secondary">👁 Cheat</button>
                <button type="button" onclick="revealAllCells()" class="btn btn-ghost">Reveal All</button>
                <button type="button" onclick="win()" class="btn btn-ghost">Auto Win</button>
            </div>
        </section>

        <section class="section">
            <h2>Settings</h2>
            <div class="fields">
                <div class="field">
                    <label for="cellWidth">Cell Width</label>
                    <div class="stepper">
                        <button type="button" class="step" onclick="stepField('cellWidth', -1)" aria-label="Decrease">−</button>
                        <input id="cellWidth" type="number" value="40" min="10" max="120" step="2">
                        <button type="button" class="step" onclick="stepField('cellWidth', 1)" aria-label="Increase">+</button>
                    </div>
                </div>
                <div class="field">
                    <label for="cellHeight">Cell Height</label>
                    <div class="stepper">
                        <button type="button" class="step" onclick="stepField('cellHeight', -1)" aria-label="Decrease">−</button>
                        <input id="cellHeight" type="number" value="40" min="10" max="120" step="2">
                        <button type="button" class="step" onclick="stepField('cellHeight', 1)" aria-label="Increase">+</button>
                    </div>
                </div>
                <div class="field">
                    <label for="cellsOnRow">Columns</label>
                    <div class="stepper">
                        <button type="button" class="step" onclick="stepField('cellsOnRow', -1)" aria-label="Decrease">−</button>
                        <input id="cellsOnRow" type="number" value="20" min="2" max="100">
                        <button type="button" class="step" onclick="stepField('cellsOnRow', 1)" aria-label="Increase">+</button>
                    </div>
                </div>
                <div class="field">
                    <label for="cellsOnColumn">Rows</label>
                    <div class="stepper">
                        <button type="button" class="step" onclick="stepField('cellsOnColumn', -1)" aria-label="Decrease">−</button>
                        <input id="cellsOnColumn" type="number" value="20" min="2" max="100">
                        <button type="button" class="step" onclick="stepField('cellsOnColumn', 1)" aria-label="Increase">+</button>
                    </div>
                </div>
                <div class="field">
                    <label for="bombsNumber">Bombs</label>
                    <div class="stepper">
                        <button type="button" class="step" onclick="stepField('bombsNumber', -5)" aria-label="Decrease">−</button>
                        <input id="bombsNumber" type="number" value="60" min="1" max="9999" step="5">
                        <button type="button" class="step" onclick="stepField('bombsNumber', 5)" aria-label="Increase">+</button>
                    </div>
                </div>
                <div class="toggle-row">
                    <label for="noGuessing">No Guessing</label>
                    <input type="checkbox" id="noGuessing" class="toggle-checkbox" checked>
                </div>
            </div>
        </section>
    </aside>
</div>

<script src="theme.js"></script>
<script src="cell.js"></script>
<script src="grid.js"></script>
<script src="game.js"></script>
<script src="sketch.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', initTheme);
</script>
</body>
</html>
